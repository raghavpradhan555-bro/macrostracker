<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Setup Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Gradient background */
      background: linear-gradient(135deg, #667eea, #764ba2, #ff6a88);
      background-size: 300% 300%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 320px;
      padding: 25px;

      /* Glass effect */
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.2);

      color: white;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      outline: none;

      background: rgba(255,255,255,0.2);
      color: white;
    }

    input::placeholder {
      color: #eee;
    }

    select {
      color: white;
    }

    option {
      color: black;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 12px;

      background: white;
      color: black;
      font-weight: bold;
      cursor: pointer;

      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #f0f0f0;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Setup Profile</h2>

  <input type="number" id="age" placeholder="Age">
  <input type="number" id="weight" placeholder="Weight (kg)">
  <input type="number" id="height" placeholder="Height (cm)">

  <select id="gender">
    <option value="">Gender</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
  </select>

  <select id="goal">
    <option value="">Goal</option>
    <option value="loss">Fat Loss</option>
    <option value="maintain">Maintain</option>
    <option value="gain">Muscle Gain</option>
  </select>

  <button onclick="saveData()">Continue</button>
</div>

<script>
function saveData() {
  const age = document.getElementById("age").value;
  const weight = document.getElementById("weight").value;
  const height = document.getElementById("height").value;
  const gender = document.getElementById("gender").value;
  const goal = document.getElementById("goal").value;

  if (!age || !weight || !height || !gender || !goal) {
    alert("Please fill all fields");
    return;
  }

  const userData = {
    age: Number(age),
    weight: Number(weight),
    height: Number(height),
    gender,
    goal
  };

  localStorage.setItem("userData", JSON.stringify(userData));

  window.location.href = "dashboard.html";
}
</script>

</body>
</html>


<style>
backdrop-filter: blur(15px);


</style>
<script>
localStorage.setItem("userData", JSON.stringify(userData));

</script>
