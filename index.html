<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Health Architecture</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.card {
  width:400px;
  padding:30px;
  border-radius:30px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
}

.hidden { display:none; }

button {
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:20px;
  font-weight:bold;
  background: linear-gradient(135deg,#0a84ff,#32d74b);
  color:white;
  cursor:pointer;
}

input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
}
</style>
</head>

<body>

<div class="card">

<!-- STEP 1 -->
<div id="step1">
  <h2>Architecture</h2>

  <input id="height" placeholder="Height">
  <input id="weight" placeholder="Weight">
  <input id="age" placeholder="Age">

  <button onclick="goStep2()">CONTINUE</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
  <h2>Goal</h2>

  <select id="goal">
    <option value="lose">Fat Loss</option>
    <option value="maintain">Maintain</option>
    <option value="gain">Gain</option>
  </select>

  <button onclick="generate()">ANALYZE</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="hidden">
  <h2>Daily Plan</h2>

  <h1 id="cal"></h1>

  <canvas id="chart"></canvas>

  <p id="protein"></p>
  <p id="carbs"></p>
  <p id="fats"></p>

  <!-- RESET -->
  <button onclick="location.reload()">RESET</button>

  <!-- ✅ CORRECT PLACE -->
  <button onclick="goTracker()">LET’S GO</button>

</div>

</div>

<script>

function goStep2(){
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

function generate(){
  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");

  let w = Number(document.getElementById("weight").value);
  let goal = document.getElementById("goal").value;

  let protein = w*2;
  let fats = w*0.8;
  let carbs = w*3;

  let cal = protein*4 + carbs*4 + fats*9;

  document.getElementById("cal").innerText = cal + " kcal";
  document.getElementById("protein").innerText = "Protein: " + protein;
  document.getElementById("carbs").innerText = "Carbs: " + carbs;
  document.getElementById("fats").innerText = "Fats: " + fats;

  new Chart(document.getElementById("chart"), {

    type: "doughnut",
    data: {
      datasets: [{
        data: [protein*4, carbs*4, fats*9],
        backgroundColor: ["red","blue","yellow"]
      }]
    }
  });
}

function goTracker(){
  window.location.href = "tracker.html";
}

</script>

</body>
</html>
