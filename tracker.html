<style>

/* RIGHT SIDE */

input {

/* COLORS */

.cal-row {

#datePicker {

#datePicker:hover {

.date-row {

}

/* keep same button style but smaller */
.filter-btn {

}

.top-bar {

/* keep it aligned to left of right panel */

/* FIX size of date picker */

/* button sizing */

}

#mealsOutput {

.top-bar {

    padding: 12px;

}
 #suggestions div {

#suggestions div:hover {

}

<body>

<!-- LEFT -->
<div class="left">
<div class="glass-card">

<h2>Daily Intake</h2>

<div class="meal">
<p class="label">Breakfast</p>
<input id="breakfast">
</div>

<div class="meal">
<p class="label">Lunch</p>
<input id="lunch">
</div>

<div class="meal">
<p class="label">Snacks</p>
<input id="snacks">
</div>

<div class="meal">
<p class="label">Dinner</p>
<input id="dinner">
</div>

<div style="margin-top:15px;">
    <input id="foodSearch" placeholder="Search food (e.g. egg, rice)">
    <div id="suggestions" style="
        background: rgba(255,255,255,0.05);
        border-radius: 12px;
        margin-top: 5px;
        max-height: 150px;
        overflow-y: auto;
        display:none;
    "></div>
</div>

<button class="pro-btn" onclick="analyzeFood()">ADD MEAL</button>

<button class="pro-btn" onclick="openCustomFood()">+ Add Custom Food</button>
</div>
</div>

<!-- RIGHT -->
<div class="right">

    <!-- TOP BAR -->
    <div class="top-bar">
        <input type="date" id="datePicker">
        <button class="pro-btn filter-btn" onclick="applyDateFilter()">FILTER</button>
    </div>

    <!-- MEALS OUTPUT -->
    <div id="mealsOutput"></div>

    <!-- TOTAL MACROS -->
    <div class="section">
        <h3>Total Macros</h3>
        <p id="totalStats"></p>
    </div>

    <!-- CHARTS -->
    <div class="section">
        <div class="charts">

            <div class="chart-box">
                <p class="chart-title">Macro Split</p>
                <canvas id="macroChart"></canvas>
            </div>

            <div class="chart-box">
                <p class="chart-title">Calorie Goal</p>
                <canvas id="calorieChart"></canvas>
            </div>

            <button class="pro-btn" onclick="downloadPDF()">Download Report</button>
        <button class="pro-btn" onclick="clearDay()">Clear Today</button>
        </div>
    </div>

    <div class="bottom-nav">
    <div class="nav-item active" onclick="location.href='tracker.html'">🏠</div>
    <div class="nav-item" onclick="location.href='analytics.html'">📊</div>
    <div class="nav-item" onclick="window.scrollTo(0,0)">⬆️</div>
</div>
 

    
</div>

<script src="foodDB.js"></script>

<script>
let currentInput = null;
let macroChart, calorieChart;
let goal = Number(localStorage.getItem("calorieGoal")) || 2000;

// 🔥 HISTORY SYSTEM
let foodHistory = JSON.parse(localStorage.getItem("foodHistory")) || {};
let today = new Date().toISOString().split('T')[0];


// ================= PARSE INPUT =================
function parseInput(meal) {

    meal = meal.toLowerCase();

    let words = meal.split(/\s+/);
    let items = [];

    let quantity = 1;

    for (let i = 0; i < words.length; i++) {

        let word = words[i];

        if (!isNaN(word)) {
            quantity = parseFloat(word);
            continue;
        }

        let match = word.match(/^(\d+)(g|ml)$/);

        if (match) {
            quantity = parseFloat(match[1]) / 100;
            continue;
        }

        let food = word.replace(/s$/, "");

        if (foodDB[food]) {
            items.push({ food, quantity });
            quantity = 1;
        }
    }

    return items;
}


// ================= MAIN FUNCTION =================
function analyzeFood() {

    let meals = {
        Breakfast: document.getElementById("breakfast").value,
        Lunch: document.getElementById("lunch").value,
        Snacks: document.getElementById("snacks").value,
        Dinner: document.getElementById("dinner").value
    };

    let total = { calories:0, protein:0, carbs:0, fats:0 };
    let html = "";

    for (let mealName in meals) {

        let items = parseInput(meals[mealName]);
        let mealTotal = { calories:0, protein:0, carbs:0, fats:0 };

        let itemsHTML = "";

        items.forEach(i => {
            let f = foodDB[i.food];

            let cal = f.calories * i.quantity;
            let protein = f.protein * i.quantity;
            let carbs = f.carbs * i.quantity;
            let fats = f.fats * i.quantity;

            mealTotal.calories += cal;
            mealTotal.protein += protein;
            mealTotal.carbs += carbs;
            mealTotal.fats += fats;

            itemsHTML += `
            <div class="food-item">
                <div class="food-top">
                    <span>${i.food} (${i.quantity.toFixed(1)})</span>
                </div>
                <div class="food-macros">
                    <span class="p">P: ${protein.toFixed(1)}</span>
                    <span class="c">C: ${carbs.toFixed(1)}</span>
                    <span class="f">F: ${fats.toFixed(1)}</span>
                </div>
            </div>
            `;
        });

        total.calories += mealTotal.calories;
        total.protein += mealTotal.protein;
        total.carbs += mealTotal.carbs;
        total.fats += mealTotal.fats;

        let percent = goal ? (mealTotal.calories / goal) * 100 : 0;

        html += `
        <div class="meal-card">
            <h4>${mealName}</h4>

          ${itemsHTML || "<p style='opacity:0.5'>No items added</p>"}

            <div class="meal-total">

                <div class="cal-row">
                    <span class="calories">
                        ${mealTotal.calories.toFixed(1)} kcal
                    </span>
                    <span class="percent">
                        ${percent.toFixed(0)}%
                    </span>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" style="width:${Math.min(percent,100)}%"></div>
                </div>

                <div class="macros">
                    <span class="p">P: ${mealTotal.protein.toFixed(1)}</span>
                    <span class="c">C: ${mealTotal.carbs.toFixed(1)}</span>
                    <span class="f">F: ${mealTotal.fats.toFixed(1)}</span>
                </div>

            </div>
        </div>`;
    }

    // 🔥 SAVE HISTORY
    let selectedDate = document.getElementById("datePicker").value || today;

    foodHistory[selectedDate] = {
        meals,
        total
    };

    localStorage.setItem("foodHistory", JSON.stringify(foodHistory));


    // 🔥 UPDATE UI
    document.getElementById("mealsOutput").innerHTML = html;

    document.getElementById("totalStats").innerHTML = `
    <span style="font-size:1.3rem; font-weight:600;">
    ${total.calories.toFixed(1)} kcal
    </span>
    <br>
    <span style="color:#3b82f6;">P: ${total.protein.toFixed(1)}</span> |
    <span style="color:#facc15;">C: ${total.carbs.toFixed(1)}</span> |
    <span style="color:#ef4444;">F: ${total.fats.toFixed(1)}</span>
    `;

    updateCharts(total);
}


// ================= LOAD DAY =================
function loadDay(date) {

    if (!foodHistory[date]) {
        alert("No data for this day");
        return;
    }

    let data = foodHistory[date];

    document.getElementById("breakfast").value = data.meals.Breakfast;
    document.getElementById("lunch").value = data.meals.Lunch;
    document.getElementById("snacks").value = data.meals.Snacks;
    document.getElementById("dinner").value = data.meals.Dinner;

    analyzeFood();
}


// ================= CHARTS =================
function updateCharts(total) {

    if (macroChart) macroChart.destroy();

    macroChart = new Chart(document.getElementById("macroChart"), {
        type: 'pie',
        data: {
            labels: ['Protein', 'Carbs', 'Fats'],
            datasets: [{
                data: [total.protein, total.carbs, total.fats],
                backgroundColor: ['#3b82f6', '#facc15', '#ef4444']
            }]
        }
    });

    if (calorieChart) calorieChart.destroy();

    let remaining = goal - total.calories;

    calorieChart = new Chart(document.getElementById("calorieChart"), {
        type: 'pie',
        data: {
            labels: ['Consumed', 'Remaining'],
            datasets: [{
                data: [total.calories, Math.max(remaining, 0)],
                backgroundColor: ['#ffffff', 'rgba(255,255,255,0.15)']
            }]
        }
    });
}


// ================= DATE SYSTEM =================
document.getElementById("datePicker").value = today;

document.getElementById("datePicker").addEventListener("change", function() {
    loadDay(this.value);
});


// ================= FILTER BUTTON =================
function applyDateFilter() {
    let selectedDate = document.getElementById("datePicker").value;

    if (!selectedDate) {
        alert("Select a date first");
        return;
    }

    loadDay(selectedDate);
}

const searchInput = document.getElementById("foodSearch");
const suggestionsBox = document.getElementById("suggestions");

searchInput.addEventListener("input", function() {

    let value = this.value.toLowerCase();
    suggestionsBox.innerHTML = "";

    if (!value) {
        suggestionsBox.style.display = "none";
        return;
    }

    let matches = Object.keys(foodDB).filter(food =>
        food.includes(value)
    );

    matches.forEach(food => {
        let div = document.createElement("div");
        div.innerText = food;

        div.addEventListener("click", () => {
            insertFood(food);
            suggestionsBox.style.display = "none";
            searchInput.value = "";
        });

        suggestionsBox.appendChild(div);
    });

    suggestionsBox.style.display = "block";
});

function insertFood(food) {

    if (currentInput) {
        currentInput.value += " " + food;
    } else {
        document.getElementById("breakfast").value += " " + food;
    }

    analyzeFood();
}

// 🔥 LOAD CUSTOM FOODS
let customFoods = JSON.parse(localStorage.getItem("customFoods")) || {};

// merge into foodDB
Object.assign(foodDB, customFoods);


// ================= MODAL =================
function openCustomFood() {
    document.getElementById("customFoodModal").style.display = "flex";
}

function closeCustomFood() {
    document.getElementById("customFoodModal").style.display = "none";
}


// ================= SAVE FOOD =================
function saveCustomFood() {

    let name = document.getElementById("cfName").value.toLowerCase();
    let calories = Number(document.getElementById("cfCalories").value);
    let protein = Number(document.getElementById("cfProtein").value);
    let carbs = Number(document.getElementById("cfCarbs").value);
    let fats = Number(document.getElementById("cfFats").value);

    if (!name) {
        alert("Enter food name");
        return;
    }

    let newFood = {
        calories,
        protein,
        carbs,
        fats
    };

    // save
    customFoods[name] = newFood;
    localStorage.setItem("customFoods", JSON.stringify(customFoods));

    // update DB
    foodDB[name] = newFood;

    closeCustomFood();

    alert(name + " added successfully!");
}

function downloadPDF() {

    let element = document.querySelector(".right");

    let opt = {
        margin: 0.5,
        filename: "nutrition-report.pdf",
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}

["breakfast","lunch","snacks","dinner"].forEach(id => {
    document.getElementById(id).addEventListener("input", () => {
        analyzeFood();
    });
});

let lastDate = localStorage.getItem("lastDate");

if (lastDate) {
    document.getElementById("datePicker").value = lastDate;
    loadDay(lastDate);
}

function clearDay() {

    let date = document.getElementById("datePicker").value;

    if (!foodHistory[date]) return;

    if (!confirm("Clear this day?")) return;

    delete foodHistory[date];
    localStorage.setItem("foodHistory", JSON.stringify(foodHistory));

    document.getElementById("breakfast").value = "";
    document.getElementById("lunch").value = "";
    document.getElementById("snacks").value = "";
    document.getElementById("dinner").value = "";

    analyzeFood();
}
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

if (!history[today]) {
    document.body.insertAdjacentHTML("afterbegin",
        `<div style="
            background:#ff3b30;
            color:white;
            padding:10px;
            text-align:center;
        ">
        You haven't tracked today ⚠️
        </div>`
    );
}

["breakfast","lunch","snacks","dinner"].forEach(id => {
    let input = document.getElementById(id);

    input.addEventListener("focus", () => {
        currentInput = input;
    });
});

    document.addEventListener("click", (e) => {
    if (!e.target.closest("#foodSearch")) {
        document.getElementById("suggestions").style.display = "none";
    }
});
